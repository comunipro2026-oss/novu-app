<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NOVU — Ecosistema Maestro</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;700;900&family=Cabinet+Grotesk:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b141a; --surface: #202c33; --accent: #8b7cf8; --accent-danger: #ea0038; --text: #e9edef; --text2: #8696a0; --me: #005c4b; }
        .light { --bg: #efeae2; --surface: #ffffff; --text: #111b21; --text2: #667781; --me: #d9fdd3; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Cabinet Grotesk', sans-serif; margin: 0; height: 100vh; overflow: hidden; }
        
        /* Layout */
        #app { display: none; height: 100vh; grid-template-columns: 280px 1fr; }
        .sidebar { background: var(--surface); border-right: 1px solid #333; display: flex; flex-direction: column; }
        .chat-area { display: flex; flex-direction: column; height: 100%; position: relative; }
        
        /* Botones e UI */
        .btn { padding: 12px; border-radius: 12px; border: none; cursor: pointer; background: var(--accent); color: white; font-weight: bold; }
        .pulse { animation: pulse 2s infinite; background: var(--accent-danger) !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        /* Pictogramas */
        .picto-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; background: var(--surface); border-top: 1px solid #333; }
        .picto { font-size: 2rem; cursor: pointer; text-align: center; background: var(--bg); padding: 10px; border-radius: 8px; }
        
        /* Modales */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; display: none; align-items: center; justify-content: center; color: white; text-align: center; }
    </style>
</head>
<body>

<!-- ONBOARDING (INCLUSIÓN) -->
<div id="onboarding" style="position:fixed; inset:0; z-index:1000; background:var(--bg); display:flex; align-items:center; justify-content:center; flex-direction:column; padding:20px;">
    <h1 style="font-family:'Fraunces'; font-size:4rem; color:var(--accent);">NOVU</h1>
    <div style="background:var(--surface); padding:30px; border-radius:20px; width:100%; max-width:350px;">
        <input type="text" id="username" placeholder="Tu Nombre" style="width:100%; padding:15px; border-radius:8px; border:none; margin-bottom:10px;">
        <p style="font-size:12px; color:var(--text2); margin-bottom:10px;">Selecciona tu perfil de interacción:</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="btn" onclick="setProfile('Neuro')">🧠 Neuro</button>
            <button class="btn" onclick="setProfile('Calma')">🍃 Calma</button>
            <button class="btn" onclick="setProfile('Directo')">⚡ Directo</button>
            <button class="btn" onclick="setProfile('Equilibrado')">📋 Equilibrado</button>
        </div>
        <button class="btn" style="width:100%; margin-top:20px; background:#444;" onclick="initApp()">Iniciar Sesión</button>
    </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app">
    <aside class="sidebar">
        <div style="padding:15px; font-weight:bold;">Contactos</div>
        <div id="contact-list" style="flex:1; overflow-y:auto;"></div>
        <button class="btn" style="margin:10px;" onclick="addContact()">+ Importar Contacto</button>
    </aside>
    
    <main class="chat-area">
        <header style="padding:15px; display:flex; justify-content:space-between; background:var(--surface);">
            <h2 id="chat-title">Chat de NOVU</h2>
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="toggleTheme()">🎨</button>
                <button class="btn" onclick="toggleCall()">📞</button>
                <button class="btn pulse" onclick="triggerSOS()">SOS</button>
            </div>
        </header>
        
        <div id="msg-container" style="flex:1; overflow-y:auto; padding:20px;"></div>
        
        <div id="picto-bar" class="picto-grid" style="display:none;"></div>
        
        <div style="padding:15px; background:var(--surface); display:flex; gap:10px;">
            <button class="btn" onclick="togglePictos()">🧩</button>
            <button class="btn" onclick="toggleVoice()">🎙️</button>
            <input type="text" id="input" style="flex:1; padding:10px; border-radius:8px; border:none;" placeholder="Escribe tu mensaje...">
            <button class="btn" onclick="sendMessage()">Enviar</button>
        </div>
    </main>
</div>

<!-- MODAL LLAMADA -->
<div id="call-modal" class="modal">
    <div>
        <h2>Llamada Activa</h2>
        <p>Conectando con tu contacto...</p>
        <button class="btn" style="background:var(--accent-danger);" onclick="toggleCall()">Colgar</button>
    </div>
</div>

<script>
    // --- ESTADO Y PERSISTENCIA ---
    let state = JSON.parse(localStorage.getItem('novu_maestro')) || { 
        profile: 'Neuro', 
        messages: [{text: 'Bienvenido a NOVU. ¿Cómo te sientes hoy?'}], 
        contacts: ['Familia', 'Apoyo', 'Dr. Benavídez'] 
    };

    function initApp() {
        state.user = document.getElementById('username').value || 'Usuario';
        document.getElementById('onboarding').style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        render();
    }

    function render() {
        document.getElementById('msg-container').innerHTML = state.messages.map(m => 
            `<div style="background:var(--surface); padding:12px; margin-bottom:10px; border-radius:8px;">${m.text}</div>`
        ).join('');
        document.getElementById('contact-list').innerHTML = state.contacts.map(c => 
            `<div style="padding:15px; border-bottom:1px solid #333; cursor:pointer;">👤 ${c}</div>`
        ).join('');
        localStorage.setItem('novu_maestro', JSON.stringify(state));
    }

    // --- ACCIONES ---
    function sendMessage() {
        const inp = document.getElementById('input');
        if(inp.value.trim()) {
            state.messages.push({text: inp.value});
            inp.value = '';
            render();
        }
    }

    function toggleVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'es-ES';
        recognition.start();
        alert("Escuchando comando...");
        recognition.onresult = (e) => {
            const transcript = e.results[0][0].transcript;
            document.getElementById('input').value = transcript;
        };
    }

    function togglePictos() {
        const bar = document.getElementById('picto-bar');
        bar.style.display = bar.style.display === 'none' ? 'grid' : 'none';
    }

    function toggleCall() {
        const modal = document.getElementById('call-modal');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    }

    function toggleTheme() { document.body.classList.toggle('light'); }
    function triggerSOS() { alert('🚨 ALERTA SOS: Enviando tu ubicación a contactos de emergencia.'); }
    function setProfile(p) { state.profile = p; alert('Perfil: ' + p); }
    function addContact() { const name = prompt('Nombre:'); if(name) { state.contacts.push(name); render(); } }

    // Generar pictogramas
    const pictos = ['💊', '💧', '🏠', '😊', '🍽️', '🙏', '❤️', '🚶', '🚗', '💤'];
    document.getElementById('picto-bar').innerHTML = pictos.map(p => 
        `<div class="picto" onclick="document.getElementById('input').value+='${p}'">${p}</div>`
    ).join('');
</script>
</body>
  </html>
